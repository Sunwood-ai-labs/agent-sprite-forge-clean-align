interface:
  display_name: "Generate 2D Sprite Clean Align"
  short_description: "Fork for original-resolution sprites, background cleanup, and alignment comparison."
  default_prompt: "Use $generate2dsprite-clean-align when a generated sprite looks rough, has magenta fringes, frame jitter, unstable placement, or needs side-by-side cleanup/alignment evaluation while preserving the original $generate2dsprite workflow; every raw sprite image must originate from built-in image_gen, not Three.js, Canvas, SVG, HTML/CSS drawing, PIL shape drawing, procedural geometry, placeholder primitives, or code-rendered screenshots; preserve original generated resolution when visual quality matters and avoid downsampling 3x3 sheets to tiny preview cells unless producing a clearly labeled engine-scale export; if a user reports magenta fringes, use color-distance cleanup plus transparent-edge fringe cleanup and compare against the old hard-threshold result; if a user reports animation jitter, compare direct split, bbox center/feet alignment, and alpha-mask similarity alignment; prefer animated WebP unless GIF is explicitly required; keep the original generate2dsprite rules for multi-row grids, body-only hero actions, separated FX/projectile/impact sheets, and prop pack classification."
