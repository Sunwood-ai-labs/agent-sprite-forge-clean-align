interface:
  display_name: "Generate 2D Map"
  short_description: "Image-generated 2D map art, props, previews, and collision data."
  default_prompt: "Use $generate2dmap to create a playable image-generated 2D game map with explicit runtime layers/objects, collision, zones, a QA preview, and engine-ready metadata; do not ship a single baked image as the runtime map unless I ask for a flat background."

policy:
  allow_implicit_invocation: true
